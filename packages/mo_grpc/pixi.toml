[workspace]
authors = ["KiviCode <kivicode.dev@gmail.com>"]
channels = [
    "https://conda.modular.com/max",
    "conda-forge",
    "https://repo.prefix.dev/modular-community",
]
name = "mo_grpc"
platforms = ["osx-arm64", "linux-64", "linux-aarch64"]
description = "Mojo gRPC client + runtime (HTTP/2 + TLS via libcurl)."
license = "MIT"
license-file = "LICENSE"
readme = "README.md"
repository = "https://github.com/kivicode/mo_grpc"
preview = ["pixi-build"]

[package]
name = "mo_grpc"
version = "0.1.0"

[package.build]
backend = { name = "pixi-build-mojo", version = "*" }

[dependencies]
mojo = ">=0.26.2.0,<0.26.3.0"
mo_protobuf = { path = "../mo_protobuf" }
mojo-curl = "*"
curl_wrapper = { git = "https://github.com/thatstoasty/mojo-curl.git", subdirectory = "shim", branch = "main" }

[package.build-dependencies]
mojo-compiler = ">=0.26.2.0,<0.26.3.0"

[package.host-dependencies]
mojo-compiler = ">=0.26.2.0,<0.26.3.0"
mo_protobuf = { path = "../mo_protobuf" }
mojo-curl = "*"
curl_wrapper = { git = "https://github.com/thatstoasty/mojo-curl.git", subdirectory = "shim", branch = "main" }

[package.run-dependencies]
mojo-compiler = ">=0.26.2.0,<0.26.3.0"
mo_protobuf = { path = "../mo_protobuf" }
mojo-curl = "*"
curl_wrapper = { git = "https://github.com/thatstoasty/mojo-curl.git", subdirectory = "shim", branch = "main" }

[tasks]
build = { cmd = "pixi build -o ." }
