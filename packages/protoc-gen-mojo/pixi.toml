[workspace]
authors = ["KiviCode <kivicode@yandex.com>"]
channels = [
    "https://conda.modular.com/max",
    "conda-forge",
    "https://repo.prefix.dev/mojo-community",
]
name = "protoc-gen-mojo"
platforms = ["osx-arm64", "linux-64", "linux-aarch64"]
description = "protoc plugin that generates Mojo structs + gRPC stubs from .proto files."
license = "MIT"
readme = "README.md"
repository = "https://github.com/KiviCode/ouroboros"
preview = ["pixi-build"]

[package]
name = "protoc-gen-mojo"
version = "0.1.0"

[package.build]
backend = { name = "pixi-build-mojo", version = "*" }

[dependencies]
mojo = ">=0.26.2.0,<0.26.3.0"
protobuf-runtime = { path = "../protobuf-runtime" }

[package.build-dependencies]
mojo-compiler = ">=0.26.2.0,<0.26.3.0"

[package.host-dependencies]
mojo-compiler = ">=0.26.2.0,<0.26.3.0"
protobuf-runtime = { path = "../protobuf-runtime" }

[package.run-dependencies]
mojo-compiler = ">=0.26.2.0,<0.26.3.0"
protobuf-runtime = { path = "../protobuf-runtime" }

[tasks]
build = { cmd = "pixi build -o ." }
publish = { cmd = "find . -name 'protoc-gen-mojo-*.conda' | xargs pixi upload https://prefix.dev/api/v1/upload/mojo-community" }
