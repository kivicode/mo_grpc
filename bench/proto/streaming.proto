syntax = "proto3";

package streaming;

message Item {
  int32 seq   = 1;
  bytes payload = 2;
}

message StreamSummary {
  int32 count       = 1;
  int32 total_bytes = 2;
}

service StreamBench {
  // Server-streaming: client sends one Item, server replies with N copies.
  rpc ServerStream (Item) returns (stream Item);

  // Client-streaming: client sends N Items, server replies with a summary.
  rpc ClientStream (stream Item) returns (StreamSummary);

  // Bidi: client sends Items, server echoes each one back immediately.
  rpc BidiStream (stream Item) returns (stream Item);
}
