syntax = "proto3";

package bench;

// A service whose only purpose is to make the server return a specific
// gRPC status code, so the Mojo client can verify trailer parsing.
service StatusProbe {
  rpc Run (StatusRequest) returns (StatusReply);
}

message StatusRequest {
  // Numeric gRPC status code the server should return. 0 = OK.
  int32 code = 1;
  // Optional human-readable message attached to the status.
  string message = 2;
  // Echoed back unchanged on OK so we can verify the body still parses.
  string echo = 3;
  // Sleep this long server-side before responding. Used by deadline tests
  // to force the client-side timeout to fire.
  int32 delay_ms = 4;
}

message StatusReply {
  string echo = 1;
  // Custom (non-transport) request metadata the server saw. Each entry is
  // formatted as "key=value", lower-cased on both ends. Used by the
  // metadata test to verify what actually landed on the wire.
  repeated string seen_metadata = 2;
}
