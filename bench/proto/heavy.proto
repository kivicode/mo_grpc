syntax = "proto3";

package bench;

service Heavy {
  rpc Echo (Document) returns (Document);
}

enum Severity {
  SEV_UNSPECIFIED = 0;
  SEV_LOW = 1;
  SEV_MEDIUM = 2;
  SEV_HIGH = 3;
}

message Tag {
  string key = 1;
  string value = 2;
}

message Vec3 {
  double x = 1;
  double y = 2;
  double z = 3;
}

message Span {
  string trace_id = 1;
  string name = 2;
  fixed64 start_ns = 3;
  fixed64 end_ns = 4;
  repeated Tag attributes = 5;
  repeated Span children = 6;
  optional Severity severity = 7;
}

message Metric {
  string name = 1;
  oneof value {
    double dbl = 2;
    sint64 i64 = 3;
    bool flag = 4;
    Vec3 vec = 5;
    string text = 6;
  }
  repeated Tag labels = 7;
}

message Document {
  int64 id = 1;
  optional string title = 2;
  repeated Metric metrics = 3;
  repeated Span spans = 4;
  map<string, Tag> annotations = 5;
  repeated bytes blobs = 6;
}
