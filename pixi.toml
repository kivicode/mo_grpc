[workspace]
authors = ["KiviCode <kivicode.dev@gmail.com>"]
channels = [
    "https://conda.modular.com/max",
    "conda-forge",
    "https://repo.prefix.dev/modular-community",
]
name = "mo_grpc"
description = "Monorepo: mo_protobuf + mo_grpc + protoc-gen-mojo for the Mojo ecosystem."
platforms = ["osx-arm64"]
version = "0.1.0"
license = "MIT"
license-file = "LICENSE"
preview = ["pixi-build"]

# Dev dependencies used when running tests / the generator from a source checkout.
# `mojo-curl` and its `curl_wrapper` shim live in `vendor/mojo-curl` (git submodule pinned to a specific
# upstream SHA) so the workspace doesn't depend
# on the `mojo-community` channel and the `curl_wrapper` package being
# resolvable as conda metadata (which it isn't, it's only published from a git subdirectory).
[dependencies]
modular = ">=26.2.0,<27"
curl_wrapper = { path = "vendor/mojo-curl/shim" }
mojo-curl = { path = "vendor/mojo-curl" }

[tasks]
test = "bash packages/protoc-gen-mojo/tests/run_tests.sh"

build-mo_protobuf = { cmd = "pixi build -o .", cwd = "packages/mo_protobuf" }
build-mo_grpc = { cmd = "pixi build -o .", cwd = "packages/mo_grpc" }
build-protoc-gen-mojo = { cmd = "pixi build -o .", cwd = "packages/protoc-gen-mojo" }
build-all = { depends-on = [
    "build-mo_protobuf",
    "build-mo_grpc",
    "build-protoc-gen-mojo",
] }
